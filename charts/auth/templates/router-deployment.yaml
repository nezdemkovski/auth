apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-router
  labels:
    {{- include "auth.componentLabels" (dict "root" . "component" "router") | nindent 4 }}
spec:
  replicas: {{ .Values.router.replicaCount }}
  selector:
    matchLabels:
      {{- include "auth.componentSelectorLabels" (dict "root" . "component" "router") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auth.componentLabels" (dict "root" . "component" "router") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: router
          image: "{{ .Values.router.image.repository }}{{ if .Values.router.image.digest }}@{{ .Values.router.image.digest }}{{ else }}:{{ .Values.router.image.tag | default .Chart.AppVersion }}{{ end }}"
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.router.service.targetPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/caddy
              readOnly: true
            - name: caddy-config
              mountPath: /config
            - name: caddy-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: auth-router
        - name: caddy-config
          emptyDir: {}
        - name: caddy-data
          emptyDir: {}

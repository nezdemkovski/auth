apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-router
  labels:
    {{- include "auth.componentLabels" (dict "root" . "component" "router") | nindent 4 }}
data:
  Caddyfile: |
    {
      servers {
        trusted_proxies static private_ranges
        trusted_proxies_strict
        client_ip_headers X-Forwarded-For X-Real-IP
      }
    }

    (api_proxy) {
      header_up -CF-Connecting-IP
      header_up -X-Real-IP
      header_up -X-Client-IP
      header_up X-Auth-Client-IP {client_ip}
    }

    :{{ .Values.router.service.targetPort }} {
      header {
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        Referrer-Policy "strict-origin-when-cross-origin"
        Permissions-Policy "camera=(), microphone=(), geolocation=()"
      }

      handle /admin/api/* {
        reverse_proxy {{ .Values.api.service.name }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.api.service.port }} {
          import api_proxy
        }
      }

      @health path /healthz /livez /readyz
      handle @health {
        reverse_proxy {{ .Values.api.service.name }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.api.service.port }} {
          import api_proxy
        }
      }

      {{- if .Values.objectStorage.enabled }}
      handle_path /storage/* {
        rewrite * /{{ .Values.objectStorage.bucket }}{uri}
        reverse_proxy {{ .Values.objectStorage.fullname }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.objectStorage.service.port }}
      }

      {{- end }}
      @admin path /admin /admin/*
      handle @admin {
        reverse_proxy {{ .Values.admin.service.name }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.admin.service.port }}
      }

      @login path /login /login/*
      handle @login {
        reverse_proxy {{ .Values.login.service.name }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.login.service.port }}
      }

      handle /api/* {
        reverse_proxy {{ .Values.api.service.name }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.api.service.port }} {
          import api_proxy
        }
      }

      respond 404
    }

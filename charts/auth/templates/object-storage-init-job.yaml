{{- if .Values.objectStorage.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.objectStorage.fullname }}-init
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
  labels:
    {{- include "auth.componentLabels" (dict "root" . "component" "object-storage-init") | nindent 4 }}
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "auth.componentLabels" (dict "root" . "component" "object-storage-init") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init-bucket
          image: "{{ .Values.objectStorage.initImage.repository }}:{{ .Values.objectStorage.initImage.tag }}@{{ .Values.objectStorage.initImage.digest }}"
          imagePullPolicy: {{ .Values.objectStorage.initImage.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              until aws --endpoint-url "$AWS_ENDPOINT_URL" s3api list-buckets >/dev/null 2>&1; do
                sleep 2
              done

              aws --endpoint-url "$AWS_ENDPOINT_URL" s3api create-bucket --bucket "$AUTH_STORAGE_BUCKET" 2>/dev/null || true
              cat >/tmp/public-read-policy.json <<EOF
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Principal": "*",
                    "Action": ["s3:GetObject"],
                    "Resource": ["arn:aws:s3:::$AUTH_STORAGE_BUCKET/*"]
                  }
                ]
              }
              EOF
              aws --endpoint-url "$AWS_ENDPOINT_URL" s3api put-bucket-policy --bucket "$AUTH_STORAGE_BUCKET" --policy file:///tmp/public-read-policy.json
          env:
            - name: AWS_ENDPOINT_URL
              value: "http://{{ .Values.objectStorage.fullname }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.objectStorage.service.port }}"
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.objectStorage.region | quote }}
            - name: AUTH_STORAGE_BUCKET
              value: {{ .Values.objectStorage.bucket | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: auth-env
                  key: AUTH_STORAGE_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-env
                  key: AUTH_STORAGE_SECRET_ACCESS_KEY
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.objectStorage.initResources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.admin.service.name }}
  labels:
    {{- include "auth.componentLabels" (dict "root" . "component" "admin") | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicaCount }}
  selector:
    matchLabels:
      {{- include "auth.componentSelectorLabels" (dict "root" . "component" "admin") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auth.componentLabels" (dict "root" . "component" "admin") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin
          image: "{{ .Values.admin.image.repository }}{{ if .Values.admin.image.digest }}@{{ .Values.admin.image.digest }}{{ else }}:{{ .Values.admin.image.tag | default .Chart.AppVersion }}{{ end }}"
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.admin.service.targetPort }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /admin/
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /admin/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          emptyDir: {}
        - name: data
          emptyDir: {}

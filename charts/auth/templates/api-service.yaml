apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.api.service.name }}
  labels:
    {{- include "auth.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "auth.componentSelectorLabels" (dict "root" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http

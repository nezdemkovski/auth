apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.api.service.name }}
  labels:
    {{- include "auth.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "auth.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auth.componentLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          env:
            - name: PORT
              value: {{ .Values.api.service.targetPort | quote }}
            - name: AUTH_PUBLIC_BASE_URL
              value: {{ .Values.env.publicBaseUrl | quote }}
            - name: AUTH_AUTO_MIGRATE
              value: {{ .Values.env.autoMigrate | quote }}
            - name: TRUST_PROXY_HEADERS
              value: {{ .Values.env.trustProxyHeaders | quote }}
            {{- if .Values.objectStorage.enabled }}
            - name: AUTH_STORAGE_PROVIDER
              value: "s3"
            - name: AUTH_STORAGE_ENDPOINT
              value: "http://{{ .Values.objectStorage.fullname }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.objectStorage.service.port }}"
            - name: AUTH_STORAGE_REGION
              value: {{ .Values.objectStorage.region | quote }}
            - name: AUTH_STORAGE_BUCKET
              value: {{ .Values.objectStorage.bucket | quote }}
            - name: AUTH_STORAGE_PUBLIC_BASE_URL
              value: {{ .Values.objectStorage.publicBaseUrl | default (printf "%s/storage" (.Values.env.publicBaseUrl | trimSuffix "/")) | quote }}
            - name: AUTH_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: auth-env
                  key: AUTH_STORAGE_ACCESS_KEY_ID
            - name: AUTH_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-env
                  key: AUTH_STORAGE_SECRET_ACCESS_KEY
            {{- else }}
            - name: AUTH_STORAGE_PROVIDER
              value: {{ .Values.env.storage.provider | quote }}
            {{- if eq .Values.env.storage.provider "s3" }}
            - name: AUTH_STORAGE_ENDPOINT
              value: {{ .Values.env.storage.endpoint | quote }}
            - name: AUTH_STORAGE_REGION
              value: {{ .Values.env.storage.region | quote }}
            - name: AUTH_STORAGE_BUCKET
              value: {{ .Values.env.storage.bucket | quote }}
            - name: AUTH_STORAGE_PUBLIC_BASE_URL
              value: {{ .Values.env.storage.publicBaseUrl | quote }}
            {{- end }}
            {{- end }}
            - name: AUTH_ADMIN_EMAIL
              value: {{ .Values.env.adminEmail | quote }}
            - name: POSTGRES_HOST
              value: {{ .Values.env.postgresHost | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.env.postgresPort | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.env.postgresDb | quote }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.redisUrlSecret.name }}
                  key: {{ .Values.env.redisUrlSecret.key }}
            {{- end }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: auth-postgres-owner
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-postgres-owner
                  key: password
          envFrom:
            - secretRef:
                name: auth-env
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

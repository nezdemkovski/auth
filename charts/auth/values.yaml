api:
  replicaCount: 1
  image:
    repository: ghcr.io/nezdemkovski/auth-api
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  service:
    name: auth-api
    port: 80
    targetPort: 3000
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 512Mi
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20

admin:
  replicaCount: 1
  image:
    repository: ghcr.io/nezdemkovski/auth-admin
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  service:
    name: auth-admin
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 5m
      memory: 32Mi
    limits:
      memory: 96Mi

login:
  replicaCount: 1
  image:
    repository: ghcr.io/nezdemkovski/auth-login
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  service:
    name: auth-login
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 5m
      memory: 32Mi
    limits:
      memory: 96Mi

router:
  replicaCount: 1
  image:
    repository: ghcr.io/nezdemkovski/auth-router
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  service:
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 5m
      memory: 32Mi
    limits:
      memory: 128Mi

env:
  autoMigrate: "false"
  trustProxyHeaders: "true"
  publicBaseUrl: https://auth.nezdemkovski.cloud
  adminEmail: yuri@nezdemkovski.com
  storage:
    provider: none
    endpoint: ""
    region: auto
    bucket: ""
    publicBaseUrl: ""
  redisUrlSecret:
    name: auth-redis
    key: REDIS_URL
  postgresHost: auth-postgres-rw.auth.svc.cluster.local
  postgresPort: "5432"
  postgresDb: auth

postgres:
  credentialsSecret:
    name: auth-postgres-owner
    usernameKey: username
    passwordKey: password

redis:
  enabled: true
  fullname: auth-redis
  image:
    repository: redis
    tag: "8.6.2-trixie"
    digest: "sha256:832d7785830f3f4b559300e6191fc914b15642c1935252338825cf4332200148"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  maxmemory: 64mb
  maxmemoryPolicy: allkeys-lru
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

objectStorage:
  enabled: false
  fullname: auth-rustfs
  bucket: auth-public
  region: us-east-1
  publicBaseUrl: ""
  image:
    repository: rustfs/rustfs
    tag: 1.0.0-beta.6
    digest: "sha256:e620d37756fff072b10bf648c7bb9d370d7e91a928b7e6a5e1ac85bdfb4e4dab"
    pullPolicy: IfNotPresent
  initImage:
    repository: amazon/aws-cli
    tag: "2.34.53"
    digest: sha256:cf53765c0de54ad3a8ea21818f1c4c845a8cf7ca87831c078a00fef244031493
    pullPolicy: IfNotPresent
  service:
    port: 9000
    consolePort: 9001
  storage:
    storageClass: local-path
    size: 5Gi
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 512Mi
  initResources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi

onepassword:
  appItem: auth
  postgresItem: auth-postgres
  redisItem: auth-redis
  redisPasswordProperty: password

networkPolicy:
  enabled: true
  additionalApiEgress: []

name: auth

x-bun-dev: &bun-dev
  image: oven/bun:1.3.14-alpine@sha256:5acc90a93e91ff07bf72aa90a7c9f0fa189765aec90b47bdbf2152d2196383c0

services:
  deps:
    <<: *bun-dev
    working_dir: /app
    command: bun install --frozen-lockfile --no-progress
    volumes:
      - ..:/app
      - bun_cache:/root/.bun/install/cache
      - node_modules:/app/node_modules

  router:
    image: caddy:2.11.3-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_started
      admin:
        condition: service_started
      login:
        condition: service_started

  api:
    <<: *bun-dev
    working_dir: /app/apps/api
    command: bun --watch run src/index.ts
    environment:
      PORT: "3000"
      AUTH_PUBLIC_BASE_URL: http://localhost:3000
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-admin@localhost.test}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      BETTER_AUTH_SECRET: local-dev-secret-local-dev-secret-32
      SECRET_ENCRYPTION_KEY: local-dev-encryption-key-local-dev-32
      AUTH_AUTO_MIGRATE: "true"
      REDIS_URL: redis://redis:6379
      TRUST_PROXY_HEADERS: "false"
      AUTH_STORAGE_PROVIDER: s3
      AUTH_STORAGE_ENDPOINT: http://rustfs:9000
      AUTH_STORAGE_REGION: us-east-1
      AUTH_STORAGE_BUCKET: auth-public
      AUTH_STORAGE_PUBLIC_BASE_URL: http://127.0.0.1:9000/auth-public
      AUTH_STORAGE_ACCESS_KEY_ID: auth-dev-access-key
      AUTH_STORAGE_SECRET_ACCESS_KEY: auth-dev-secret-key
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rustfs-init:
        condition: service_completed_successfully

  admin:
    <<: *bun-dev
    working_dir: /app
    command: bun --cwd apps/admin vite --host 0.0.0.0 --port 5173 --strictPort
    volumes:
      - ..:/app
      - bun_cache:/root/.bun/install/cache
      - node_modules:/app/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully

  login:
    <<: *bun-dev
    working_dir: /app
    command: bun --cwd apps/login vite --host 0.0.0.0 --port 5174 --strictPort
    volumes:
      - ..:/app
      - bun_cache:/root/.bun/install/cache
      - node_modules:/app/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully

  postgres:
    image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.4.0-alpine@sha256:4eec4565e45aa0b3966554c866bc73211e281b0b3d89fe9a33c982e6faca809d
    ports:
      - "63790:6379"

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.6@sha256:e620d37756fff072b10bf648c7bb9d370d7e91a928b7e6a5e1ac85bdfb4e4dab
    command: ["--address", ":9000", "--console-enable", "/data"]
    environment:
      RUSTFS_ACCESS_KEY: auth-dev-access-key
      RUSTFS_SECRET_KEY: auth-dev-secret-key
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data

  rustfs-init:
    image: amazon/aws-cli:2.34.53@sha256:cf53765c0de54ad3a8ea21818f1c4c845a8cf7ca87831c078a00fef244031493
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until aws --endpoint-url=http://rustfs:9000 s3api list-buckets >/dev/null 2>&1;
        do sleep 1; done;
        aws --endpoint-url=http://rustfs:9000 s3api create-bucket --bucket auth-public >/dev/null 2>&1 || true;
        aws --endpoint-url=http://rustfs:9000 s3api put-bucket-policy --bucket auth-public --policy
        '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":["s3:GetObject"],"Resource":["arn:aws:s3:::auth-public/*"]}]}'
    environment:
      AWS_ACCESS_KEY_ID: auth-dev-access-key
      AWS_SECRET_ACCESS_KEY: auth-dev-secret-key
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      rustfs:
        condition: service_started

volumes:
  postgres_data:
  rustfs_data:
  bun_cache:
  node_modules:

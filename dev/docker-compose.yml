name: auth

x-bun-dev: &bun-dev
  image: oven/bun:1.3.14-alpine

services:
  deps:
    <<: *bun-dev
    working_dir: /app
    command: bun install --frozen-lockfile --no-progress
    volumes:
      - ..:/app
      - bun_cache:/root/.bun/install/cache
      - node_modules:/app/node_modules

  router:
    image: caddy:2.11.3-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_started
      admin:
        condition: service_started
      login:
        condition: service_started

  api:
    <<: *bun-dev
    working_dir: /app/apps/api
    command: bun --watch run src/index.ts
    environment:
      PORT: "3000"
      AUTH_PUBLIC_BASE_URL: http://127.0.0.1:3000
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-admin@localhost.test}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      BETTER_AUTH_SECRET: local-dev-secret-local-dev-secret-32
      AUTH_AUTO_MIGRATE: "true"
      REDIS_URL: redis://redis:6379
      TRUST_PROXY_HEADERS: "false"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  admin:
    <<: *bun-dev
    working_dir: /app
    command: bun --cwd apps/admin vite --host 0.0.0.0 --port 5173 --strictPort
    volumes:
      - ..:/app
      - bun_cache:/root/.bun/install/cache
      - node_modules:/app/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully

  login:
    <<: *bun-dev
    working_dir: /app
    command: bun --cwd apps/login vite --host 0.0.0.0 --port 5174 --strictPort
    volumes:
      - ..:/app
      - bun_cache:/root/.bun/install/cache
      - node_modules:/app/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully

  postgres:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.4.0-alpine
    ports:
      - "63790:6379"

volumes:
  postgres_data:
  bun_cache:
  node_modules:

name: auth-integration

services:
  postgres:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_DB: auth_test
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "54330:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth_test"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.4.0-alpine
    ports:
      - "63800:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20

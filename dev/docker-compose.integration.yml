name: auth-integration

services:
  postgres:
    image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: auth_test
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "54330:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth_test"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.4.0-alpine@sha256:4eec4565e45aa0b3966554c866bc73211e281b0b3d89fe9a33c982e6faca809d
    ports:
      - "63800:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.6@sha256:e620d37756fff072b10bf648c7bb9d370d7e91a928b7e6a5e1ac85bdfb4e4dab
    command: ["--address", ":9000", "--console-enable", "/data"]
    environment:
      RUSTFS_ACCESS_KEY: auth-integration-access-key
      RUSTFS_SECRET_KEY: auth-integration-secret-key
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9002:9000"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O- http://127.0.0.1:9000/health >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 20

  rustfs-init:
    image: amazon/aws-cli:2.34.53@sha256:cf53765c0de54ad3a8ea21818f1c4c845a8cf7ca87831c078a00fef244031493
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until aws --endpoint-url=http://rustfs:9000 s3api list-buckets >/dev/null 2>&1;
        do sleep 1; done;
        aws --endpoint-url=http://rustfs:9000 s3api create-bucket --bucket auth-integration-public >/dev/null 2>&1 || true;
        aws --endpoint-url=http://rustfs:9000 s3api put-bucket-policy --bucket auth-integration-public --policy
        '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":["s3:GetObject"],"Resource":["arn:aws:s3:::auth-integration-public/*"]}]}'
    environment:
      AWS_ACCESS_KEY_ID: auth-integration-access-key
      AWS_SECRET_ACCESS_KEY: auth-integration-secret-key
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      rustfs:
        condition: service_started

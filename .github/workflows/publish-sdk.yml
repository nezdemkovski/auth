name: Publish Auth Package

on:
  push:
    tags:
      - "auth-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Set up Node and npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install current npm CLI
        run: npm install --global npm@11.17.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve package from tag
        id: package
        shell: bash
        run: |
          package_dir="packages/public/auth"
          version="${GITHUB_REF_NAME#auth-v}"

          package_name="$(node -p "require('./${package_dir}/package.json').name")"
          package_version="$(node -p "require('./${package_dir}/package.json').version")"
          if [ "$package_version" != "$version" ]; then
            echo "Tag version $version does not match $package_dir version $package_version"
            exit 1
          fi

          echo "dir=$package_dir" >> "$GITHUB_OUTPUT"
          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Typecheck and test
        run: bun run test

      - name: Build package
        run: bun run build --filter=${{ steps.package.outputs.name }}

      - name: Validate package contents
        run: npm pack "./${{ steps.package.outputs.dir }}" --dry-run

      - name: Refuse existing package versions
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "Refusing to overwrite ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
            exit 1
          fi

      - name: Publish package
        run: npm publish ./${{ steps.package.outputs.dir }} --access public

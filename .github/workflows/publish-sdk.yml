name: Publish SDK Packages

on:
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Set up Node and npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install current npm CLI
        run: npm install --global npm@11.17.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#sdk-v}"
          for manifest in \
            packages/auth-contracts/package.json \
            packages/auth-client/package.json \
            packages/auth-server/package.json; do
            package_version="$(node -p "require('./${manifest}').version")"
            if [ "$package_version" != "$version" ]; then
              echo "Tag version $version does not match $manifest version $package_version"
              exit 1
            fi
          done

      - name: Typecheck and test
        run: bun run test

      - name: Build SDK packages
        run: bun run build --filter=@nezdemkovski/auth-client --filter=@nezdemkovski/auth-server

      - name: Refuse existing package versions
        shell: bash
        run: |
          for manifest in \
            packages/auth-contracts/package.json \
            packages/auth-client/package.json \
            packages/auth-server/package.json; do
            package_name="$(node -p "require('./${manifest}').name")"
            package_version="$(node -p "require('./${manifest}').version")"
            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "Refusing to overwrite ${package_name}@${package_version}"
              exit 1
            fi
          done

      - name: Publish contracts
        run: npm publish ./packages/auth-contracts --access public

      - name: Publish client
        run: npm publish ./packages/auth-client --access public

      - name: Publish server
        run: npm publish ./packages/auth-server --access public

name: Publish Image

on:
  push:
    branches: [master]
    paths:
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig*.json
      - apps/**
      - packages/**
      - charts/auth/Chart.yaml
      - .github/workflows/publish-image.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Read app version
        id: chart
        run: |
          app_version="$(grep '^appVersion:' charts/auth/Chart.yaml | sed -E 's/appVersion:[[:space:]]*"?([^"]+)"?/\1/')"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/nezdemkovski/auth-api:${{ steps.chart.outputs.app_version }}

      - name: Build and push admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ghcr.io/nezdemkovski/auth-admin:${{ steps.chart.outputs.app_version }}

      - name: Build and push login
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/login/Dockerfile
          push: true
          tags: ghcr.io/nezdemkovski/auth-login:${{ steps.chart.outputs.app_version }}

name: Publish Image

on:
  push:
    branches: [master]
    paths:
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig*.json
      - apps/**
      - packages/**
      - charts/auth/Chart.yaml
      - .github/workflows/publish-image.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Read app version
        id: chart
        run: |
          app_version="$(grep '^appVersion:' charts/auth/Chart.yaml | sed -E 's/appVersion:[[:space:]]*"?([^"]+)"?/\1/')"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Refuse mutable release tags
        run: |
          for image in auth-api auth-admin auth-login auth-router; do
            if docker buildx imagetools inspect "ghcr.io/nezdemkovski/$image:${{ steps.chart.outputs.app_version }}" >/dev/null 2>&1; then
              echo "Refusing to overwrite existing image tag: $image:${{ steps.chart.outputs.app_version }}"
              exit 1
            fi
          done

      - name: Build and push api
        id: api
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/nezdemkovski/auth-api:${{ steps.chart.outputs.app_version }}
          provenance: mode=max
          sbom: true

      - name: Build and push admin
        id: admin
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ghcr.io/nezdemkovski/auth-admin:${{ steps.chart.outputs.app_version }}
          provenance: mode=max
          sbom: true

      - name: Build and push login
        id: login
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/login/Dockerfile
          push: true
          tags: ghcr.io/nezdemkovski/auth-login:${{ steps.chart.outputs.app_version }}
          provenance: mode=max
          sbom: true

      - name: Build and push router
        id: router
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/router/Dockerfile
          push: true
          tags: ghcr.io/nezdemkovski/auth-router:${{ steps.chart.outputs.app_version }}
          provenance: mode=max
          sbom: true

      - name: Record immutable image references
        run: |
          {
            echo "### Published images"
            echo '- `ghcr.io/nezdemkovski/auth-api@${{ steps.api.outputs.digest }}`'
            echo '- `ghcr.io/nezdemkovski/auth-admin@${{ steps.admin.outputs.digest }}`'
            echo '- `ghcr.io/nezdemkovski/auth-login@${{ steps.login.outputs.digest }}`'
            echo '- `ghcr.io/nezdemkovski/auth-router@${{ steps.router.outputs.digest }}`'
          } >> "$GITHUB_STEP_SUMMARY"

name: Publish Helm Chart

on:
  push:
    branches: [master]
    paths:
      - charts/auth/**
      - .github/workflows/publish-helm-chart.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-helm-chart-${{ github.ref }}
  cancel-in-progress: false

env:
  CHART_PATH: charts/auth
  CHART_REPOSITORY: ghcr.io/${{ github.repository_owner }}/charts
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Lint chart
        run: helm lint "$CHART_PATH"

      - name: Package chart
        run: helm package "$CHART_PATH" --destination .helm-packages

      - name: Login to GHCR
        run: echo "${{ github.token }}" | helm registry login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Publish chart
        run: helm push .helm-packages/auth-*.tgz "oci://$CHART_REPOSITORY"

name: Integration Tests

on:
  pull_request:
    paths:
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig*.json
      - apps/**
      - packages/**
      - .github/workflows/integration-tests.yml
  push:
    branches: [master]
    paths:
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig*.json
      - apps/**
      - packages/**
      - .github/workflows/integration-tests.yml

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: auth_test
          POSTGRES_USER: auth
          POSTGRES_PASSWORD: auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auth -d auth_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:8.4.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
      rustfs:
        image: rustfs/rustfs:1.0.0-beta.6
        env:
          RUSTFS_ACCESS_KEY: auth-integration-access-key
          RUSTFS_SECRET_KEY: auth-integration-secret-key
          RUSTFS_CONSOLE_ENABLE: "true"
        ports:
          - 9002:9000
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare RustFS bucket
        env:
          AWS_ACCESS_KEY_ID: auth-integration-access-key
          AWS_SECRET_ACCESS_KEY: auth-integration-secret-key
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws_cli() {
            docker run --rm --network host \
              -e AWS_ACCESS_KEY_ID \
              -e AWS_SECRET_ACCESS_KEY \
              -e AWS_DEFAULT_REGION \
              amazon/aws-cli:2.34.53 "$@"
          }

          rustfs_ready=false
          for attempt in {1..30}; do
            if aws_cli --endpoint-url=http://127.0.0.1:9002 s3api list-buckets >/dev/null 2>&1; then
              rustfs_ready=true
              break
            fi
            sleep 1
          done

          if [ "$rustfs_ready" != "true" ]; then
            echo "RustFS did not become ready"
            exit 1
          fi

          aws_cli \
            --endpoint-url=http://127.0.0.1:9002 s3api create-bucket \
            --bucket auth-integration-public >/dev/null 2>&1 || true

          aws_cli \
            --endpoint-url=http://127.0.0.1:9002 s3api put-bucket-policy \
            --bucket auth-integration-public \
            --policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":["s3:GetObject"],"Resource":["arn:aws:s3:::auth-integration-public/*"]}]}'

      - name: Run integration tests
        env:
          AUTH_INTEGRATION_DATABASE_URL: postgres://auth:auth@127.0.0.1:5432/auth_test
          REDIS_URL: redis://127.0.0.1:6379
        run: bun run test:integration

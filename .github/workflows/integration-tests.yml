name: Integration Tests

on:
  pull_request:
    paths:
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig*.json
      - apps/**
      - packages/**
      - .github/workflows/integration-tests.yml
      - playwright.config.ts
      - tests/browser/**
  push:
    branches: [master]
    paths:
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig*.json
      - apps/**
      - packages/**
      - .github/workflows/integration-tests.yml
      - playwright.config.ts
      - tests/browser/**

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: auth_test
          POSTGRES_USER: auth
          POSTGRES_PASSWORD: auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auth -d auth_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:8.4.0-alpine@sha256:4eec4565e45aa0b3966554c866bc73211e281b0b3d89fe9a33c982e6faca809d
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
      rustfs:
        image: rustfs/rustfs:1.0.0-beta.6@sha256:e620d37756fff072b10bf648c7bb9d370d7e91a928b7e6a5e1ac85bdfb4e4dab
        env:
          RUSTFS_ACCESS_KEY: auth-integration-access-key
          RUSTFS_SECRET_KEY: auth-integration-secret-key
          RUSTFS_CONSOLE_ENABLE: "true"
        ports:
          - 9002:9000
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare RustFS bucket
        env:
          AWS_ACCESS_KEY_ID: auth-integration-access-key
          AWS_SECRET_ACCESS_KEY: auth-integration-secret-key
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws_cli() {
            docker run --rm --network host \
              -e AWS_ACCESS_KEY_ID \
              -e AWS_SECRET_ACCESS_KEY \
              -e AWS_DEFAULT_REGION \
              amazon/aws-cli:2.34.53@sha256:cf53765c0de54ad3a8ea21818f1c4c845a8cf7ca87831c078a00fef244031493 "$@"
          }

          rustfs_ready=false
          for attempt in {1..30}; do
            if aws_cli --endpoint-url=http://127.0.0.1:9002 s3api list-buckets >/dev/null 2>&1; then
              rustfs_ready=true
              break
            fi
            sleep 1
          done

          if [ "$rustfs_ready" != "true" ]; then
            echo "RustFS did not become ready"
            exit 1
          fi

          aws_cli \
            --endpoint-url=http://127.0.0.1:9002 s3api create-bucket \
            --bucket auth-integration-public >/dev/null 2>&1 || true

          aws_cli \
            --endpoint-url=http://127.0.0.1:9002 s3api put-bucket-policy \
            --bucket auth-integration-public \
            --policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":["s3:GetObject"],"Resource":["arn:aws:s3:::auth-integration-public/*"]}]}'

      - name: Run integration tests
        env:
          AUTH_INTEGRATION_DATABASE_URL: postgres://auth:auth@127.0.0.1:5432/auth_test
          REDIS_URL: redis://127.0.0.1:6379
        run: bun run test:integration

      - name: Install browser
        run: bunx playwright install --with-deps chromium

      - name: Run browser tests
        run: bun run test:browser

name: Integration Tests

on:
  pull_request:
    paths:
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig*.json
      - apps/**
      - packages/**
      - .github/workflows/integration-tests.yml
  push:
    branches: [master]
    paths:
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig*.json
      - apps/**
      - packages/**
      - .github/workflows/integration-tests.yml

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: auth_test
          POSTGRES_USER: auth
          POSTGRES_PASSWORD: auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auth -d auth_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:8.4.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        env:
          AUTH_INTEGRATION_DATABASE_URL: postgres://auth:auth@127.0.0.1:5432/auth_test
          REDIS_URL: redis://127.0.0.1:6379
        run: bun run test:integration
